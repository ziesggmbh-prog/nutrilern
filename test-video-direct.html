<!DOCTYPE html>
<html>
<head>
    <title>Direct Video Test</title>
</head>
<body>
    <h1>Direct Video Test</h1>
    <video controls width="640" height="360">
        <source src="/assets/AI_Intro_X_1751549357807.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
    
    <script>
        const video = document.querySelector('video');
        video.addEventListener('error', (e) => {
            console.error('Video Error:', e);
            console.error('Error code:', video.error?.code);
            console.error('Error message:', video.error?.message);
        });
        
        video.addEventListener('loadstart', () => console.log('Load start'));
        video.addEventListener('loadedmetadata', () => console.log('Metadata loaded'));
        video.addEventListener('loadeddata', () => console.log('Data loaded'));
        video.addEventListener('canplay', () => console.log('Can play'));
    </script>
</body>
</html>
