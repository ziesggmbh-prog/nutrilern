<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        video {
            width: 100%;
            max-width: 800px;
            height: auto;
        }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            display: none;
        }
        .complete-btn {
            background: #16a34a;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .complete-btn:hover {
            background: #15803d;
        }
    </style>
</head>
<body>
    <video id="mainVideo" controls autoplay>
        <source id="videoSource" src="/ai_intro_video1.mp4" type="video/mp4">
        Video nicht unterstützt
    </video>
    
    <div class="controls" id="controls">
        <button class="complete-btn" onclick="completeVideo()">
            ✓ Video fertig angeschaut
        </button>
    </div>

    <script>
        // Get video URL from query parameter
        const urlParams = new URLSearchParams(window.location.search);
        const videoUrl = urlParams.get('video');
        
        console.log('Video URL requested:', videoUrl);
        
        if (videoUrl) {
            const videoElement = document.getElementById('mainVideo');
            const sourceElement = document.getElementById('videoSource');
            
            // Ensure correct path format
            const cleanUrl = videoUrl.startsWith('/') ? videoUrl : '/' + videoUrl;
            sourceElement.src = cleanUrl;
            console.log('Setting video source to:', cleanUrl);
            
            videoElement.load(); // Reload video with new source
            
            // Add error handling
            videoElement.addEventListener('error', function(e) {
                console.error('Video error:', e);
                console.error('Video source:', sourceElement.src);
            });
            
            videoElement.addEventListener('loadstart', function() {
                console.log('Video load started');
            });
            
            videoElement.addEventListener('loadeddata', function() {
                console.log('Video data loaded successfully');
            });
        }
        
        // Show controls when video ends
        document.getElementById('mainVideo').addEventListener('ended', function() {
            document.getElementById('controls').style.display = 'block';
        });
        
        // Show controls after 10 seconds for manual completion
        setTimeout(() => {
            document.getElementById('controls').style.display = 'block';
        }, 10000);
        
        function completeVideo() {
            if (window.parent) {
                window.parent.postMessage('video-complete', '*');
            } else {
                window.close();
            }
        }
    </script>
</body>
</html>
